<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>内部行情 - YAiS生态</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e27; color: #e2e8f0; min-height: 100vh; padding-bottom: 80px; position: relative; overflow-x: hidden; }
body::before { content:''; position:fixed; top:0;left:0;right:0;bottom:0; background: radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.12) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(139,92,246,0.08) 0%, transparent 50%); pointer-events:none; z-index:0; }
.page { position:relative; z-index:1; max-width:430px; margin:0 auto; padding:0 16px 80px; }
.glass-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 20px; margin-bottom: 16px; position:relative; overflow:hidden; }
.glass-card::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent); }
.pair-selector { display:flex; gap:6px; margin-bottom:12px; }
.pair-btn { flex:1; padding:10px 4px; border-radius:12px; font-size:12px; font-weight:600; border:1px solid rgba(255,255,255,0.08); background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.3s; text-align:center; }
.pair-btn.active { background: linear-gradient(135deg, #3b82f6, #6366f1); color:#fff; border-color:transparent; }
.period-selector { display:flex; gap:4px; margin-bottom:12px; overflow-x:auto; }
.period-btn { padding:6px 12px; border-radius:8px; font-size:11px; font-weight:600; border:1px solid rgba(255,255,255,0.08); background:transparent; color:rgba(255,255,255,0.4); cursor:pointer; transition:all 0.3s; white-space:nowrap; }
.period-btn.active { background:rgba(59,130,246,0.2); color:#3b82f6; border-color:rgba(59,130,246,0.3); }
.price-display { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:16px; }
.price-main { font-size:32px; font-weight:800; }
.price-change { font-size:14px; font-weight:600; padding:4px 10px; border-radius:8px; }
.price-up { color:#10b981; background:rgba(16,185,129,0.1); }
.price-down { color:#ef4444; background:rgba(239,68,68,0.1); }
.stat-row { display:flex; justify-content:space-between; padding:6px 0; font-size:12px; }
.stat-label { color:rgba(255,255,255,0.4); }
.stat-value { color:rgba(255,255,255,0.7); font-weight:600; }
.chart-container { width:100%; height:320px; }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,14,39,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-around; padding:8px 0 24px; z-index:100; }
.nav-item { display:flex; flex-direction:column; align-items:center; text-decoration:none; color:rgba(255,255,255,0.35); font-size:11px; gap:4px; }
.nav-item .icon { font-size:22px; }
.nav-item.active { color:#3b82f6; }
.notice { font-size:11px; color:rgba(255,255,255,0.3); text-align:center; padding:8px 0; }
@media (min-width:431px) { .bottom-nav { border-radius:0; } }
</style>
</head>
<body>
<div class="page">
    <div style="padding:40px 0 16px;">
        <h1 style="font-size:24px; font-weight:800;">内部行情</h1>
        <p style="font-size:12px; color:rgba(255,255,255,0.4); margin-top:4px;">基于DApp内部兑换交易生成 &#183; 仅供参考</p>
    </div>

    <div class="glass-card">
        <div class="pair-selector">
            <button class="pair-btn active" onclick="switchPair('ht_usdt', this)">HT/USDT</button>
            <button class="pair-btn" onclick="switchPair('yais_ht', this)">YAiS/HT</button>
            <button class="pair-btn" onclick="switchPair('yais_ql', this)">YAiS/QL</button>
        </div>
        <div class="period-selector">
            <button class="period-btn" onclick="switchPeriod('1m', this)">1分</button>
            <button class="period-btn" onclick="switchPeriod('5m', this)">5分</button>
            <button class="period-btn" onclick="switchPeriod('15m', this)">15分</button>
            <button class="period-btn active" onclick="switchPeriod('1h', this)">1时</button>
            <button class="period-btn" onclick="switchPeriod('4h', this)">4时</button>
            <button class="period-btn" onclick="switchPeriod('1d', this)">1天</button>
        </div>

        <div class="price-display">
            <div>
                <div class="price-main" id="current-price">1.0000</div>
                <div style="font-size:12px; color:rgba(255,255,255,0.4); margin-top:4px;" id="pair-label">HT/USDT</div>
            </div>
            <div class="price-change price-up" id="price-change">+0.00%</div>
        </div>

        <div id="chart-main" class="chart-container"></div>

        <div style="margin-top:16px;">
            <div class="stat-row">
                <span class="stat-label">24h开盘</span>
                <span class="stat-value" id="stat-open">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h最高</span>
                <span class="stat-value" id="stat-high">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h最低</span>
                <span class="stat-value" id="stat-low">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h成交量</span>
                <span class="stat-value" id="stat-vol">--</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">24h成交额</span>
                <span class="stat-value" id="stat-amount">--</span>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <h3 style="font-size:14px; font-weight:700; margin-bottom:12px;">最近交易记录</h3>
        <div id="trade-list" style="max-height:200px; overflow-y:auto;"></div>
    </div>

    <p class="notice">行情数据基于DApp内部兑换交易生成 &#183; 不上任何交易所</p>
</div>

<nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon">&#127968;</span><span>首页</span></a>

    <a href="my.html" class="nav-item"><span class="icon">&#128100;</span><span>我的</span></a>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script>
const PAIR_CONFIG = {
    'ht_usdt': { name: 'HT/USDT', basePrice: 1.0, volatility: 0.005, decimals: 4 },
    'yais_ht': { name: 'YAiS/HT', basePrice: 0.1, volatility: 0.01, decimals: 4 },
    'yais_ql': { name: 'YAiS/QL', basePrice: 10.0, volatility: 0.008, decimals: 2 }
};
const PERIOD_MINUTES = { '1m': 1, '5m': 5, '15m': 15, '1h': 60, '4h': 240, '1d': 1440 };
let currentPair = 'ht_usdt';
let currentPeriod = '1h';
let chart = null;
let chartData = null;

function generateKLineData(pair, period) {
    const config = PAIR_CONFIG[pair];
    const periodMin = PERIOD_MINUTES[period];
    const count = 100;
    const now = Date.now();
    const data = [];
    let price = config.basePrice;
    for (let i = count - 1; i >= 0; i--) {
        const time = now - i * periodMin * 60 * 1000;
        const open = price;
        const change = (Math.random() - 0.48) * config.volatility * price;
        const close = Math.max(open + change, config.basePrice * 0.5);
        const amplitude = Math.abs(change) + Math.random() * config.volatility * price * 0.5;
        const high = Math.max(open, close) + amplitude * 0.3;
        const low = Math.min(open, close) - amplitude * 0.3;
        const volume = Math.floor(Math.random() * 5000 + 1000);
        const amount = volume * close;
        data.push({ time: time, open: parseFloat(open.toFixed(config.decimals)), close: parseFloat(close.toFixed(config.decimals)), high: parseFloat(high.toFixed(config.decimals)), low: parseFloat(low.toFixed(config.decimals)), volume: volume, amount: parseFloat(amount.toFixed(2)) });
        price = close;
    }
    return data;
}

function generateTradeList(pair, count) {
    const config = PAIR_CONFIG[pair];
    const trades = [];
    const types = ['&#20080;&#20837;', '&#21334;&#20986;'];
    for (let i = 0; i < count; i++) {
        const time = new Date(Date.now() - Math.random() * 3600000);
        const price = config.basePrice * (1 + (Math.random() - 0.5) * config.volatility * 2);
        const amount = Math.floor(Math.random() * 500 + 10);
        trades.push({ time: time.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' }), price: price.toFixed(config.decimals), amount: amount, type: types[Math.floor(Math.random() * 2)] });
    }
    return trades.reverse();
}

function renderChart() {
    if (!chart) return;
    const config = PAIR_CONFIG[currentPair];
    const times = chartData.map(d => {
        const date = new Date(d.time);
        if (currentPeriod === '1d') return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
        return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
    });
    const ohlc = chartData.map(d => [d.open, d.close, d.low, d.high]);
    const volumes = chartData.map(d => d.volume);
    const lastData = chartData[chartData.length - 1];
    const firstData = chartData[0];
    const changePercent = ((lastData.close - firstData.open) / firstData.open * 100);
    document.getElementById('current-price').innerText = lastData.close.toFixed(config.decimals);
    document.getElementById('pair-label').innerText = config.name;
    const changeEl = document.getElementById('price-change');
    changeEl.innerText = (changePercent >= 0 ? '+' : '') + changePercent.toFixed(2) + '%';
    changeEl.className = 'price-change ' + (changePercent >= 0 ? 'price-up' : 'price-down');
    document.getElementById('stat-open').innerText = firstData.open.toFixed(config.decimals);
    document.getElementById('stat-high').innerText = Math.max(...chartData.map(d => d.high)).toFixed(config.decimals);
    document.getElementById('stat-low').innerText = Math.min(...chartData.map(d => d.low)).toFixed(config.decimals);
    document.getElementById('stat-vol').innerText = volumes.reduce((a,b) => a+b, 0).toLocaleString();
    document.getElementById('stat-amount').innerText = chartData.map(d => d.amount).reduce((a,b) => a+b, 0).toFixed(2);
    chart.setOption({
        animation: false,
        backgroundColor: 'transparent',
        textStyle: { color: '#e2e8f0', fontSize: 10 },
        grid: [ { left: '8%', right: '8%', top: '4%', height: '58%' }, { left: '8%', right: '8%', top: '68%', height: '24%' } ],
        xAxis: [ { type: 'category', data: times, gridIndex: 0, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }, axisLabel: { show: false } }, { type: 'category', data: times, gridIndex: 1, axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }, axisLabel: { color: 'rgba(255,255,255,0.3)', fontSize: 9 } } ],
        yAxis: [ { scale: true, gridIndex: 0, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }, axisLabel: { color: 'rgba(255,255,255,0.4)', fontSize: 9 } }, { gridIndex: 1, splitLine: { show: false }, axisLabel: { color: 'rgba(255,255,255,0.3)', fontSize: 9 } } ],
        series: [ { name: 'K&#32447;', type: 'candlestick', data: ohlc, xAxisIndex: 0, yAxisIndex: 0, itemStyle: { color: '#ef4444', color0: '#10b981', borderColor: '#ef4444', borderColor0: '#10b981' } }, { name: '&#25104;&#20132;&#37327;', type: 'bar', data: volumes.map((v, i) => ({ value: v, itemStyle: { color: ohlc[i][1] >= ohlc[i][0] ? 'rgba(239,68,68,0.4)' : 'rgba(16,185,129,0.4)' } })), xAxisIndex: 1, yAxisIndex: 1 } ],
        tooltip: { trigger: 'axis', axisPointer: { type: 'cross' }, backgroundColor: 'rgba(26,31,58,0.95)', borderColor: 'rgba(255,255,255,0.1)', textStyle: { color: '#e2e8f0', fontSize: 11 }, formatter: function(params) { if (!params || params.length === 0) return ''; const k = params[0]; const idx = k.dataIndex; const d = chartData[idx]; const cfg = PAIR_CONFIG[currentPair]; let html = '<div style="font-size:11px;line-height:1.6;">'; html += '<div style="color:rgba(255,255,255,0.5);margin-bottom:4px;">' + k.axisValue + '</div>'; html += '<div>&#24320;: <span style="color:#f59e0b;">' + d.open.toFixed(cfg.decimals) + '</span></div>'; html += '<div>&#39640;: <span style="color:#ef4444;">' + d.high.toFixed(cfg.decimals) + '</span></div>'; html += '<div>&#20302;: <span style="color:#10b981;">' + d.low.toFixed(cfg.decimals) + '</span></div>'; html += '<div>&#25910;: <span style="color:#3b82f6;">' + d.close.toFixed(cfg.decimals) + '</span></div>'; html += '<div>&#37327;: ' + d.volume.toLocaleString() + '</div>'; html += '</div>'; return html; } }
    });
}

function renderTradeList() {
    const trades = generateTradeList(currentPair, 20);
    const config = PAIR_CONFIG[currentPair];
    const html = trades.map(t => { const isUp = t.type === '&#20080;&#20837;'; const color = isUp ? '#ef4444' : '#10b981'; return '<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:12px;">' + '<span style="color:rgba(255,255,255,0.4);">' + t.time + '</span>' + '<span style="color:' + color + '; font-weight:600;">' + t.price + '</span>' + '<span style="color:rgba(255,255,255,0.5);">' + t.amount + '</span>' + '<span style="color:' + color + ';">' + t.type + '</span>' + '</div>'; }).join('');
    document.getElementById('trade-list').innerHTML = html;
}

function switchPair(pair, btn) {
    currentPair = pair;
    document.querySelectorAll('.pair-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chartData = generateKLineData(currentPair, currentPeriod);
    renderChart(); renderTradeList();
}

function switchPeriod(period, btn) {
    currentPeriod = period;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    chartData = generateKLineData(currentPair, currentPeriod);
    renderChart();
}

document.addEventListener('DOMContentLoaded', function() {
    chart = echarts.init(document.getElementById('chart-main'), null, { renderer: 'canvas' });
    chartData = generateKLineData(currentPair, currentPeriod);
    renderChart(); renderTradeList();
    window.addEventListener('resize', function() { if (chart) chart.resize(); });
    setInterval(function() { chartData = generateKLineData(currentPair, currentPeriod); renderChart(); }, 10000);
});
</script>
</body>
