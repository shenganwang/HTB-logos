<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生态节点 - 算力中心</title>
    <style>
      <body>
    <!-- 1. 顶部状态栏 -->
    <div class="header">
        <h1>⚡ AI 算力网络</h1>
        <span class="status-badge">● 主网运行中</span>
    </div>

    <!-- 2. 核心数据看板 -->
    <div class="dashboard">
        <div class="card full">
            <div class="label">我的总算力 (HTB)</div>
            <div class="value" id="totalHash">12,450.00</div>
            <div class="sub">预计日产出: 35.2 HTB</div>
        </div>
        <div class="card">
            <div class="label">在线节点</div>
            <div class="value small">3 <span class="unit">个</span></div>
        </div>
        <div class="card">
            <div class="label">累计贡献</div>
            <div class="value small">892 <span class="unit">小时</span></div>
        </div>
    </div>

    <!-- 3. 运行中的节点列表 -->
    <div style="padding: 0 20px;">
        <h3 style="color: #fff; border-left: 4px solid #f0b90b; padding-left: 10px;">运行中的节点</h3>
        
        <!-- 节点卡片 1 -->
        <div class="node-item">
            <div class="node-info">
                <div class="node-name">超级验证节点 A-01</div>
                <div class="node-desc">类型：基础层 | 质押：5000 HTB</div>
            </div>
            <div class="node-status">
                <div class="profit">+12.5 /h</div>
                <div class="status-dot">● 运行正常</div>
            </div>
        </div>

        <!-- 节点卡片 2 -->
        <div class="node-item">
            <div class="node-info">
                <div class="node-name">边缘计算节点 B-03</div>
                <div class="node-desc">类型：应用层 | 质押：2000 HTB</div>
            </div>
            <div class="node-status">
                <div class="profit">+8.2 /h</div>
                <div class="status-dot">● 运行正常</div>
            </div>
        </div>
    </div>

    <!-- 4. 【新增】购买模拟器与计算器 -->
    <div style="margin: 20px; padding: 20px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333;">
        <h3 style="color: #f0b90b; margin-top: 0;">🛒 部署新节点</h3>
        
        <div style="margin-bottom: 15px;">
            <label style="font-size: 12px; color: #888;">投入节点数量 (1个=1 HTB)</label>
            <input type="number" id="nodeInput" placeholder="请输入数量 (如 1000)" 
                   style="width: 93%; padding: 12px; background: #0d0d0d; border: 1px solid #444; color: white; border-radius: 8px; font-size: 16px; margin-top: 5px;">
        </div>

        <!-- 计算结果展示区 -->
        <div id="calcResult" style="background: #0d0d0d; padding: 15px; border-radius: 8px; display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                <span style="color: #888;">当前档位倍率：</span>
                <span style="color: #00ff88; font-weight: bold;" id="showRate">-</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span style="color: #888;">预计每日释放 YAiS：</span>
                <span style="color: #f0b90b; font-weight: bold; font-size: 18px;" id="showYais">-</span>
            </div>
        </div>

        <button class="btn-primary" style="width: 100%; margin-top: 15px; padding: 15px; background: #f0b90b; border: none; border-radius: 8px; color: black; font-weight: bold; font-size: 16px;">立即支付 HTB 部署</button>
    </div>

    <!-- 底部导航栏 (保持一致) -->
    <div class="action-area">
        <div class="nav-item">
            <div style="font-size: 20px;">🏠</div>
            <div style="font-size: 10px; color: #888;">首页</div>
        </div>
        <div class="nav-item active">
            <div style="font-size: 20px;">⚡</div>
            <div style="font-size: 10px; color: #f0b90b;">节点</div>
        </div>
        <div class="nav-item">
            <div style="font-size: 20px;">🤖</div>
            <div style="font-size: 10px; color: #888;">AI应用</div>
        </div>
        <div class="nav-item">
            <div style="font-size: 20px;">👤</div>
            <div style="font-size: 10px; color: #888;">我的</div>
        </div>
    </div>

    <!-- 5. 【核心逻辑】JavaScript 脚本 -->
    <script>
        // 监听输入框的变化
        document.getElementById('nodeInput').addEventListener('input', function(e) {
            var count = parseInt(e.target.value); // 获取输入的数量
            var resultBox = document.getElementById('calcResult');
            var rateText = document.getElementById('showRate');
            var yaisText = document.getElementById('showYais');

            if (count > 0) {
                resultBox.style.display = 'block'; // 显示结果区域
                
                var rate = 1; // 默认倍率
                // --- 这里是我们刚才定的逻辑 ---
                if (count >= 100 && count <= 999) {
                    rate = 1.6;
                } else if (count >= 1000 && count <= 2999) {
                    rate = 2.0;
                } else if (count >= 3000) {
                    rate = 3.0;
                }
                
                // 计算公式：数量 * 0.005 * 倍率
                var dailyYais = (count * 0.005 * rate).toFixed(2); 

                rateText.innerText = rate + " 倍";
                yaisText.innerText = dailyYais + " YAiS";
            } else {
                resultBox.style.display = 'none'; // 如果没输入或为0，隐藏结果
            }
        });
    </script>
</body>
    <!-- 顶部状态 -->
    <div class="header">

    </div>

    <!-- 核心仪表盘 -->
    <div class="dashboard">
        <div class="card full">

            <div class="num">12,450.00</div>
            <div class="unit">预计日产出: 35.2 HTB</div>
        </div>
        <div class="card">
            <h3>在线节点</h3>
            <div class="num">3</div>
            <div class="unit">个</div>
        </div>
        <div class="card">
            <h3>累计贡献</h3>
            <div class="num">892</div>
            <div class="unit">小时</div>
        </div>
    </div>

    <!-- 节点列表 -->
    <div class="section-title">运行中的节点</div>
    <div class="node-list">
        <!-- 节点 1 -->
        <div class="node-item">

                <h4>超级验证节点 A-01</h4>
                <p>类型: 基础层 | 质押: 5000 HTB</p>
            </div>
            <div class="node-status">
                <div class="hash">+12.5 /h</div>
                <div class="state">● 运行正常</div>
            </div>
        </div>
        <!-- 节点 2 -->
        <div class="node-item">
            <div class="node-info">
                <h4>边缘计算节点 B-03</h4>
                <p>类型: 应用层 | 质押: 2000 HTB</p>
            </div>
            <div class="node-status">
                <div class="hash">+8.2 /h</div>
                <div class="state">● 运行正常</div>
            </div>
        </div>
         <!-- 节点 3 -->
         <div class="node-item" style="border-left-color: #f0b90b;">
            <div class="node-info">
                <h4>AI 推理节点 C-07</h4>
                <p>类型: 高级层 | 质押: 5450 HTB</p>
            </div>
            <div class="node-status">
                <div class="hash">+14.5 /h</div>
                <div class="state" style="color:#f0b90b">● 算力满载</div>
            </div>
        </div>
    </div>

    <!-- 底部固定按钮 -->
    <div class="action-area">
        <button class="btn btn-secondary" onclick="alert('功能开发中...')">查看图谱</button>
        <button class="btn btn-primary" onclick="alert('请前往首页充值后部署')">部署新节点</button>
    </div>

    <!-- 底部导航 (保持与首页一致) -->
    <div style="height: 60px;"></div> <!-- 占位符 -->
    <div class="bottom-nav" style="position:fixed; bottom:0; width:100%; background:#111; border-top:1px solid #333; display:flex; justify-content:space-around; padding:10px 0; box-sizing:border-box; z-index:999;">
        <a href="index.html" style="color:#666; text-decoration:none; text-align:center; flex:1;">

</body>
