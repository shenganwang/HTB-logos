    let userData = {

        yais: 200.00,
        qlb: 50.00,
        nodes: 1000,
        multiplier: 2.0
    };

    // === 2. 初始化：从 LocalStorage 读取最新数据 ===
    function initNodePage() {
        const savedData = localStorage.getItem('yais_user_data');
        if (savedData) {
            // 如果有存档，就加载存档
            userData = JSON.parse(savedData);
        } else {
            // 如果没存档（第一次来），就保存一份初始数据
            saveData(); 
        }
        
        updateUI(); // 刷新界面数字
    }

    // === 3. 保存数据到“公共账本” ===
    function saveData() {
        localStorage.setItem('yais_user_data', JSON.stringify(userData));
    }

    // === 4. 更新界面显示 ===
    function updateUI() {
        // 更新显示的节点数量
        const nodeCountEl = document.getElementById('current-nodes');
        if(nodeCountEl) nodeCountEl.innerText = userData.nodes;

        // 更新显示的余额 (让用户知道买不买得起)
        const balanceEl = document.getElementById('user-balance');
        if(balanceEl) balanceEl.innerText = userData.htb.toFixed(2);
    }

    // === 5. 核心功能：购买节点逻辑 ===
    function buyNodes(amount, cost) {
        // 检查余额是否足够
        if (userData.htb >= cost) {
            // 扣钱

            // 加节点
            userData.nodes += amount;
            
            // 保存新数据
            saveData();
            // 刷新界面
            updateUI();
            
            alert(`成功！\n消耗: ${cost} HTB\n获得: ${amount} 节点\n当前节点总数: ${userData.nodes}`);
        } else {
            alert("余额不足！请去首页充值或兑换。");
        }
    }

    // 页面加载完成后立即执行
    window.onload = initNodePage;

<!-- 核心计算逻辑脚本 -->
<script>
    function calculateYAiS() {
        // 1. 获取用户输入的数量
        let count = document.getElementById('nodeInput').value;
        count = parseFloat(count);

        // 如果没输入或小于0，重置显示
        if (!count || count <= 0) {
            document.getElementById('rateDisplay').innerText = "1.0 倍 (未达标)";
            document.getElementById('dailyYAiS').innerText = "0.00";
            document.getElementById('roiDays').innerText = "-- 天";
            return;
        }

        // 2. 判断倍率 (根据你的文档逻辑)
        let multiplier = 1.0; // 默认
        let tierText = "1.0 倍 (基础档)";

        if (count >= 100 && count < 1000) {
            multiplier = 1.6;
            tierText = "1.6 倍 (青铜档)";
        } else if (count >= 1000 && count < 3000) {
            multiplier = 2.0;
            tierText = "2.0 倍 (黄金档)";
        } else if (count >= 3000) {
            multiplier = 3.0;
            tierText = "3.0 倍 (钻石档)";
        }

        // 3. 计算每日产出 YAiS
        // 公式：节点数 * 0.005 (千分之五) * 倍率
        let dailyOutput = count * 0.005 * multiplier;

        // 4. 计算回本周期 (粗略估算：假设YAiS价格不变)
        // 成本是 count (HTB)，每天赚 dailyOutput (YAiS)
        // 这里为了演示，我们假设 1 YAiS = 0.1 HTB (按初始价)
        // 每天价值 = dailyOutput * 0.1
        let dailyValue = dailyOutput * 0.1; 
        let daysToRecover = count / dailyValue;

        // 5. 更新页面显示
        document.getElementById('rateDisplay').innerText = tierText;
        document.getElementById('dailyYAiS').innerText = dailyOutput.toFixed(2);
        
        if(dailyValue > 0) {
             document.getElementById('roiDays').innerText = Math.ceil(daysToRecover) + " 天";
        } else {
             document.getElementById('roiDays').innerText = "-- 天";
        }
    }
</script>
