<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI生态节点 - 算力中心</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0d0d0d; color: white; font-family: sans-serif; padding-bottom: 80px; }
        
        /* 顶部标题栏 */
        .header { padding: 20px; background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .header h1 { margin: 0; font-size: 20px; color: #f0b90b; }
        .status-badge { background: rgba(0, 255, 127, 0.1); color: #00ff7f; padding: 4px 8px; border-radius: 4px; font-size: 12px; border: 1px solid #00ff7f; }

        /* 核心数据卡片 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .card.full { grid-column: span 2; background: linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%); border: 1px solid #f0b90b; }
        .card h3 { margin: 0 0 5px 0; font-size: 12px; color: #888; }
        .card .num { font-size: 24px; font-weight: bold; color: white; }
        .card .unit { font-size: 12px; color: #666; }
        .card.full .num { color: #f0b90b; font-size: 32px; }

        /* 节点列表 */
        .section-title { padding: 0 15px; font-size: 16px; font-weight: bold; margin-top: 10px; display: flex; align-items: center; }
        .section-title::before { content: ''; display: block; width: 4px; height: 16px; background: #f0b90b; margin-right: 8px; border-radius: 2px; }
        
        .node-list { padding: 15px; }
        .node-item { background: #161616; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid #00ff7f; }
        .node-info h4 { margin: 0 0 5px 0; font-size: 15px; }
        .node-info p { margin: 0; font-size: 12px; color: #888; }
        .node-status { text-align: right; }
        .node-status .hash { font-size: 12px; color: #f0b90b; margin-bottom: 4px; }
        .node-status .state { font-size: 12px; color: #00ff7f; }

        /* 底部操作区 */
        .action-area { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; padding: 15px; box-sizing: border-box; border-top: 1px solid #333; display: flex; gap: 10px; z-index: 100; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-primary { background: #f0b90b; color: black; }
        .btn-secondary { background: #333; color: white; border: 1px solid #555; }
    </style>
</head>
<body>

    <!-- 顶部状态 -->
    <div class="header">
        <h1>⚡ AI 算力网络</h1>
        <span class="status-badge">● 主网运行中</span>
    </div>

    <!-- 核心仪表盘 -->
    <div class="dashboard">
        <div class="card full">
            <h3>我的总算力 (HTB)</h3>
            <div class="num">12,450.00</div>
            <div class="unit">预计日产出: 35.2 HTB</div>
        </div>
        <div class="card">
            <h3>在线节点</h3>
            <div class="num">3</div>
            <div class="unit">个</div>
        </div>
        <div class="card">
            <h3>累计贡献</h3>
            <div class="num">892</div>
            <div class="unit">小时</div>
        </div>
    </div>

    <!-- 节点列表 -->
    <div class="section-title">运行中的节点</div>
    <div class="node-list">
        <!-- 节点 1 -->
        <div class="node-item">
            <div class="node-info">
                <h4>超级验证节点 A-01</h4>
                <p>类型: 基础层 | 质押: 5000 HTB</p>
            </div>
            <div class="node-status">
                <div class="hash">+12.5 /h</div>
                <div class="state">● 运行正常</div>
            </div>
        </div>
        <!-- 节点 2 -->
        <div class="node-item">
            <div class="node-info">
                <h4>边缘计算节点 B-03</h4>
                <p>类型: 应用层 | 质押: 2000 HTB</p>
            </div>
            <div class="node-status">
                <div class="hash">+8.2 /h</div>
                <div class="state">● 运行正常</div>
            </div>
        </div>
         <!-- 节点 3 -->
         <div class="node-item" style="border-left-color: #f0b90b;">
            <div class="node-info">
                <h4>AI 推理节点 C-07</h4>
                <p>类型: 高级层 | 质押: 5450 HTB</p>
            </div>
            <div class="node-status">
                <div class="hash">+14.5 /h</div>
                <div class="state" style="color:#f0b90b">● 算力满载</div>
            </div>
        </div>
    </div>

    <!-- 底部固定按钮 -->
    <div class="action-area">
        <button class="btn btn-secondary" onclick="alert('功能开发中...')">查看图谱</button>
        <button class="btn btn-primary" onclick="alert('请前往首页充值后部署')">部署新节点</button>
    </div>

    <!-- 底部导航 (保持与首页一致) -->
    <div style="height: 60px;"></div> <!-- 占位符 -->
    <div class="bottom-nav" style="position:fixed; bottom:0; width:100%; background:#111; border-top:1px solid #333; display:flex; justify-content:space-around; padding:10px 0; box-sizing:border-box; z-index:999;">
        <a href="index.html" style="color:#666; text-decoration:none; text-align:center; flex:1;">
            <div style="font-size:20px;">🏠</div><div style="font-size:10px;">首页</div>
        </a>
        <a href="node.html" style="color:#f0b90b; text-decoration:none; text-align:center; flex:1;">
            <div style="font-size:20px;">⚡</div><div style="font-size:10px;">节点</div>
        </a>
        <a href="#" style="color:#666; text-decoration:none; text-align:center; flex:1;">
            <div style="font-size:20px;">🤖</div><div style="font-size:10px;">AI应用</div>
        </a>
        <a href="#" style="color:#666; text-decoration:none; text-align:center; flex:1;">
            <div style="font-size:20px;">👤</div><div style="font-size:10px;">我的</div>
        </a>
    </div>

</body>
</html>
