<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的资产 - YAiS生态</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0e27; color: #e2e8f0; min-height: 100vh; padding-bottom: 80px; position: relative; overflow-x: hidden; }
body::before { content:''; position:fixed; top:0;left:0;right:0;bottom:0; background: radial-gradient(ellipse at 20% 0%, rgba(59,130,246,0.12) 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, rgba(139,92,246,0.08) 0%, transparent 50%); pointer-events:none; z-index:0; }
.page { position:relative; z-index:1; max-width:430px; margin:0 auto; padding:0 16px 80px; }
.asset-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:18px; padding:18px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; position:relative; overflow:hidden; }
.asset-card::before { content:''; position:absolute; top:0;left:0;right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent); }
.asset-info h3 { font-size:14px; margin:0 0 6px 0; color:rgba(255,255,255,0.5); }
.asset-balance { font-size:26px; font-weight:800; color:#fff; }
.asset-actions { display:flex; gap:6px; }
.asset-actions button { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); padding:8px 14px; border-radius:10px; margin-left:4px; cursor:pointer; font-size:12px; transition:all 0.3s; }
.asset-actions button:active { background:rgba(255,255,255,0.12); }
.asset-actions button.primary { background:linear-gradient(135deg,#3b82f6,#6366f1); color:#fff; border:none; font-weight:600; }
.menu-list { margin-top:24px; }
.menu-item { background:rgba(255,255,255,0.04); padding:15px 18px; border-bottom:1px solid rgba(255,255,255,0.04); display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:background 0.2s; }
.menu-item:first-child { border-radius:14px 14px 0 0; }
.menu-item:last-child { border-radius:0 0 14px 14px; border-bottom:none; }
.menu-item:active { background:rgba(255,255,255,0.08); }
.bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:430px; background:rgba(10,14,39,0.95); backdrop-filter:blur(20px); border-top:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-around; padding:8px 0 24px; z-index:100; }
.nav-item { display:flex; flex-direction:column; align-items:center; text-decoration:none; color:rgba(255,255,255,0.35); font-size:11px; gap:4px; }
.nav-item .icon { font-size:22px; }
.nav-item.active { color:#3b82f6; }
@media (min-width:431px) { .bottom-nav { border-radius:0; } }
</style>
</head>
<body>
<div class="page">
    <!-- 顶部 -->
    <div style="padding:40px 0 20px;">
        <h1 style="font-size:24px; font-weight:800;">我的资产中心</h1>
    </div>

    <!-- HTB -->
    <div class="asset-card">
        <div class="asset-info">
            <h3>HTB (算力储备)</h3>
            <div class="asset-balance" id="balance-htb" style="color:#f59e0b;">0.00</div>
        </div>
        <div class="asset-actions">
            <button onclick="alert('充值通道维护中')">充值</button>
            <button class="primary" onclick="alert('请先绑定钱包')">提现</button>
        </div>
    </div>

    <!-- YAiS -->
    <div class="asset-card" style="border-color:rgba(59,130,246,0.2);">
        <div class="asset-info">
            <h3 style="color:rgba(59,130,246,0.7);">YAiS (核心权益)</h3>
            <div class="asset-balance" id="balance-yais" style="color:#3b82f6;">0.00</div>
        </div>
        <div class="asset-actions">
            <button onclick="alert('兑换功能开发中')">兑HTB</button>
            <button class="primary" onclick="window.location.href='node.html'">进应用</button>
        </div>
    </div>

    <!-- QLB -->
    <div class="asset-card">
        <div class="asset-info">
            <h3>QLB (消费积分)</h3>
            <div class="asset-balance" id="balance-qlb" style="color:#f97316;">0.00</div>
        </div>
        <div class="asset-actions">
            <button onclick="alert('暂无可质押项')">质押</button>
            <button class="primary" onclick="window.location.href='node.html'">去消费</button>
        </div>
    </div>

    <!-- 菜单列表 -->
    <div class="menu-list">
        <div class="menu-item" onclick="alert('邀请好友功能即将上线')">
            <span>🤝 邀请好友</span>
            <span style="color:rgba(255,255,255,0.2);">›</span>
        </div>
        <div class="menu-item" onclick="window.location.href='node.html'">
            <span>⚙️ 我的节点</span>
            <span style="color:rgba(255,255,255,0.2);">›</span>
        </div>
        <div class="menu-item" onclick="alert('设置功能开发中')">
            <span>🔒 安全设置</span>
            <span style="color:rgba(255,255,255,0.2);">›</span>
        </div>
    </div>
</div>

<!-- 底部导航 -->
<nav class="bottom-nav">
    <a href="index.html" class="nav-item"><span class="icon">🏠</span><span>首页</span></a>
    <a href="node.html" class="nav-item"><span class="icon">⚡</span><span>节点</span></a>
    <a href="https://ysai.lzxjsm.cn/h5/5.html#/pages/index/index" class="nav-item" target="_blank"><span class="icon">🤖</span><span>AI应用</span></a>
    <a href="my.html" class="nav-item active"><span class="icon">👤</span><span>我的</span></a>
</nav>

<script>
// ===== 核心逻辑 - 保持原版 =====
const userData = {
    htb: localStorage.getItem('user_htb') || 12450,
    yais: localStorage.getItem('user_yais') || 35.20,
    qlb: localStorage.getItem('user_qlb') || 892
};
document.getElementById('balance-htb').innerText = parseFloat(userData.htb).toFixed(2);
document.getElementById('balance-yais').innerText = parseFloat(userData.yais).toFixed(2);
document.getElementById('balance-qlb').innerText = parseFloat(userData.qlb).toFixed(0);

// 同步 localStorage 数据
function syncFromMain() {
    const savedData = localStorage.getItem('yais_user_data');
    if (savedData) {
        const d = JSON.parse(savedData);
        document.getElementById('balance-htb').innerText = d.htb.toFixed(2);
        document.getElementById('balance-yais').innerText = d.yais.toFixed(2);
        document.getElementById('balance-qlb').innerText = d.qlb.toFixed(0);
    }
}
document.addEventListener('DOMContentLoaded', syncFromMain);
</script>
</body>
</html>
