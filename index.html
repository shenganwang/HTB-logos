<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAiS - AI算力生态</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #020617; 
            color: #e2e8f0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-image: radial-gradient(circle at 50% 0%, #1e3a8a 0%, #020617 60%);
            min-height: 100vh;
        }
        .glass-card { 
            background: rgba(30, 41, 59, 0.4); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .gradient-text { 
            background: linear-gradient(135deg, #60a5fa 0%, #34d399 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .nav-item.active { color: #34d399; text-shadow: 0 0 10px rgba(52, 211, 153, 0.5); }
        .token-logo { 
            width: 56px; 
            height: 56px; 
            object-fit: contain; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.03); 
            padding: 6px; 
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .token-logo:hover { transform: scale(1.1) rotate(5deg); border-color: #34d399; }
        .glow-btn { 
            background: linear-gradient(90deg, #2563eb, #059669); 
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
        }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const GITHUB_USER = "shenganwang";
        const GITHUB_REPO = "HTB-logos";
        const BRANCH = "main"; 

        const getRawUrl = (filename) => `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${filename}`;

        const LOGOS = {
            USDT: "https://img.alicdn.com/imgextra/i2/O1CN01Z7Q5QO1M5V5V5V5V5_!!6000000001234-2-tps-200-200.png",
            HTB: getRawUrl("20260714165703_49_6.png"),
            YAiS: getRawUrl("20260714165704_50_6.png"),
            QLB: getRawUrl("20260714165706_51_6.png")
        };

        const Icon = ({ name, size = 24, color = "currentColor" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} stroke={color}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [assets, setAssets] = useState({ usdt: 1000.00, htb: 500.00, yais: 120.50, qlb: 5000.00, nodes: 1500 });

            const getMultiplier = (count) => {
                if (count >= 3000) return 3.0;
                if (count >= 1000) return 2.0;
                if (count >= 100) return 1.6;
                return 1.0;
            };
            const multiplier = getMultiplier(assets.nodes);
            const dailyRelease = (assets.nodes * 0.005 * multiplier).toFixed(2);

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto relative overflow-hidden">
                    <main className="flex-1 overflow-y-auto pb-24 p-5 scrollbar-hide">
                        {activeTab === 'home' && <Home assets={assets} multiplier={multiplier} dailyRelease={dailyRelease} />}
                        {activeTab === 'exchange' && <Exchange assets={assets} setAssets={setAssets} />}
                        {activeTab === 'nodes' && <Nodes assets={assets} />}
                        {activeTab === 'ai' && <AIApp assets={assets} />}
                    </main>

                    <nav className="fixed bottom-0 w-full max-w-md bg-slate-900/80 backdrop-blur-xl border-t border-white/5 flex justify-around items-center py-4 z-50">
                        <NavBtn icon="home" label="首页" active={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                        <NavBtn icon="refresh-cw" label="兑换" active={activeTab === 'exchange'} onClick={() => setActiveTab('exchange')} />
                        <NavBtn icon="server" label="节点" active={activeTab === 'nodes'} onClick={() => setActiveTab('nodes')} />
                        <NavBtn icon="cpu" label="AI应用" active={activeTab === 'ai'} onClick={() => setActiveTab('ai')} />
                    </nav>
                </div>
            );
        }

        function NavBtn({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center space-y-1 transition-all ${active ? 'text-emerald-400 scale-110' : 'text-slate-500 hover:text-slate-300'}`}>
                    <Icon name={icon} size={22} color={active ? '#34d399' : '#64748b'} />
                    <span className="text-[10px] font-medium">{label}</span>
                </button>
            );
        }

        function Home({ assets, multiplier, dailyRelease }) {
            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center mb-2">
                        <h1 className="text-3xl font-black gradient-text tracking-tight">YAiS Eco</h1>
                        <div className="bg-emerald-500/10 px-3 py-1 rounded-full text-xs text-emerald-400 border border-emerald-500/20 font-bold">
                            Lv.{assets.nodes >= 3000 ? 'MAX' : assets.nodes >= 1000 ? 'PRO' : 'BASIC'}
                        </div>
                    </div>

                    <div className="glass-card rounded-3xl p-6 relative overflow-hidden group">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/20 blur-3xl rounded-full -mr-10 -mt-10"></div>
                        <p className="text-slate-400 text-sm font-medium mb-1">预估总资产 (USDT)</p>
                        <h2 className="text-4xl font-bold text-white mb-6 tracking-tight">
                            ${(assets.usdt + assets.htb + (assets.yais * 0.1)).toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </h2>
                        
                        <div className="grid grid-cols-3 gap-3">
                            <AssetItem label="HTB" value={assets.htb} logo={LOGOS.HTB} color="text-blue-400" />
                            <AssetItem label="YAiS" value={assets.yais} logo={LOGOS.YAiS} color="text-amber-400" />
                            <AssetItem label="QLB" value={assets.qlb} logo={LOGOS.QLB} color="text-emerald-400" />
                        </div>
                    </div>

                    <div className="glass-card rounded-2xl p-5 border-l-4 border-amber-500 bg-gradient-to-r from-slate-800/50 to-transparent">
                        <div className="flex justify-between items-center mb-3">
                            <div>
                                <p className="text-slate-400 text-xs uppercase tracking-wider">当前节点数</p>
                                <p className="text-2xl font-bold text-white">{assets.nodes}</p>
                            </div>
                            <div className="text-right">
                                <p className="text-slate-400 text-xs uppercase tracking-wider">释放倍率</p>
                                <p className="text-2xl font-bold text-amber-400">{multiplier}x</p>
                            </div>
                        </div>
                        <div className="pt-3 border-t border-white/5 flex justify-between items-center">
                            <span className="text-xs text-slate-400">今日预计释放</span>
                            <span className="text-sm font-bold text-amber-400 bg-amber-500/10 px-2 py-1 rounded">+{dailyRelease} YAiS</span>
                        </div>
                    </div>
                </div>
            );
        }

        function AssetItem({ label, value, logo, color }) {
            return (
                <div className="bg-slate-800/40 p-3 rounded-2xl text-center flex flex-col items-center border border-white/5 hover:border-white/10 transition-colors">
                    <img src={logo} alt={label} className="token-logo" onError={(e) => e.target.style.display='none'} />
                    <p className={`text-xs ${color} font-bold mb-1`}>{label}</p>
                    <p className="text-sm font-mono text-white truncate w-full">{Number(value).toLocaleString()}</p>
                </div>
            );
        }

        function Exchange({ assets, setAssets }) {
            const [mode, setMode] = useState('UtoH');
            const [amount, setAmount] = useState('');

            const handleSwap = () => {
                if (!amount || parseFloat(amount) <= 0) return alert("请输入有效数量");
                const val = parseFloat(amount);
                
                if (mode === 'UtoH') {
                    if (val > assets.usdt) return alert("USDT 余额不足");
                    setAssets(prev => ({...prev, usdt: prev.usdt - val, htb: prev.htb + val}));
                } else if (mode === 'HtoU') {
                    if (val > assets.htb) return alert("HTB 余额不足");
                    setAssets(prev => ({...prev, htb: prev.htb - val, usdt: prev.usdt + val}));
                } else if (mode === 'YtoH') {
                    if (val > assets.yais) return alert("YAiS 余额不足");
                    setAssets(prev => ({...prev, yais: prev.yais - val, htb: prev.htb + (val * 0.1)}));
                } else if (mode === 'YtoQ') {
                    if (val > assets.yais) return alert("YAiS 余额不足");
                    setAssets(prev => ({...prev, yais: prev.yais - val, qlb: prev.qlb + (val * 10)}));
                }
                setAmount('');
                alert("兑换成功！(模拟)");
            };

            const getRateText = () => {
                if (mode === 'UtoH' || mode === 'HtoU') return "1 : 1";
                if (mode === 'YtoH') return "1 YAiS = 0.1 HTB";
                if (mode === 'YtoQ') return "1 YAiS = 10 QLB";
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-white mb-6">资产兑换中心</h2>
                    <div className="grid grid-cols-2 gap-3 mb-6">
                        {['UtoH', 'HtoU', 'YtoH', 'YtoQ'].map(m => (
                            <button key={m} onClick={() => {setMode(m); setAmount('')}} className={`p-3 rounded-xl text-sm font-bold transition-all ${mode === m ? 'bg-blue-600 text-white shadow-lg shadow-blue-900/50' : 'bg-slate-800/50 text-slate-400 hover:bg-slate-700'}`}>
                                {m === 'UtoH' ? 'USDT → HTB' : m === 'HtoU' ? 'HTB → USDT' : m === 'YtoH' ? 'YAiS → HTB' : 'YAiS → QLB'}
                            </button>
                        ))}
                    </div>

                    <div className="glass-card p-6 rounded-3xl relative border border-white/10">
                        <div className="absolute top-4 right-4 bg-slate-900/80 text-[10px] px-2 py-1 rounded-full text-slate-300 border border-white/5">汇率: {getRateText()}</div>
                        
                        <div className="mb-2">
                            <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-3">支付数量</label>
                            <div className="flex items-center bg-slate-900/50 rounded-2xl p-4 border border-white/5 focus-within:border-blue-500/50 transition-colors">
                                <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className="bg-transparent text-white text-2xl w-full outline-none font-mono" placeholder="0.00" />
                                <span className="text-slate-400 font-bold ml-2 bg-slate-800 px-2 py-1 rounded text-sm">{mode.includes('U') ? 'USDT' : mode.includes('H') && mode !== 'YtoH' ? 'HTB' : 'YAiS'}</span>
                            </div>
                        </div>

                        <div className="flex justify-center my-2"><div className="bg-slate-800 p-2 rounded-full border border-white/5"><Icon name="arrow-down" size={20} className="text-slate-400" /></div></div>

                        <div>
                            <label className="text-xs text-slate-400 font-bold uppercase tracking-wider block mb-3">获得数量 (预估)</label>
                            <div className="flex items-center bg-slate-800/30 rounded-2xl p-4 border border-white/5">
                                <span className="text-2xl text-white font-mono">{amount ? (mode === 'YtoQ' ? amount * 10 : mode === 'YtoH' ? amount * 0.1 : amount) : '0.00'}</span>
                                <span className="text-slate-400 font-bold ml-2 bg-slate-800 px-2 py-1 rounded text-sm">{mode === 'UtoH' || mode === 'HtoU' || mode === 'YtoH' ? 'HTB' : 'QLB'}</span>
                            </div>
                        </div>

                        <button onClick={handleSwap} className="w-full mt-8 glow-btn py-4 rounded-2xl font-bold text-white text-lg active:scale-95 transition-transform">确认兑换</button>
                    </div>
                </div>
            );
        }

        function Nodes({ assets }) {
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-white">节点权益中心</h2>
                    <div className="glass-card p-6 rounded-3xl bg-gradient-to-br from-slate-800 to-slate-900 border border-amber-500/20">
                        <p className="text-slate-400 text-sm font-bold uppercase">当前持有节点</p>
                        <div className="flex items-end gap-2 mt-2">
                            <span className="text-5xl font-black text-white">{assets.nodes}</span>
                            <span className="text-lg text-slate-500 mb-2 font-bold">个</span>
                        </div>
                    </div>
                    <div className="glass-card p-5 rounded-2xl border-l-4 border-amber-500">
                        <p className="font-bold text-white text-lg">当前倍率: {assets.nodes >= 1000 ? '2.0x' : '1.6x'}</p>
                        <p className="text-xs text-slate-400 mt-2">每日单节点释放: 0.005 * 倍率 YAiS</p>
                    </div>
                </div>
            );
        }

        function AIApp({ assets }) {
            return (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-white">AI 算力应用</h2>
                    <div className="glass-card p-8 rounded-3xl text-center border border-emerald-500/20 bg-emerald-900/5">
                        <div className="w-20 h-20 bg-emerald-500/10 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-400 shadow-[0_0_30px_rgba(16,185,129,0.2)]">
                            <Icon name="cpu" size={40} />
                        </div>
                        <h3 className="text-xl font-bold text-white mb-2">QLB 算力质押</h3>
                        <p className="text-sm text-slate-400 mb-6">锁定 QLB 获取平台分红</p>
                        <div className="bg-slate-900/50 p-4 rounded-2xl mb-6 border border-white/5">
                            <span className="text-slate-400 text-xs font-bold uppercase">可用 QLB</span>
                            <div className="text-2xl font-mono text-emerald-400 mt-1">{assets.qlb.toLocaleString()}</div>
                        </div>
                        <button className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold transition shadow-lg shadow-emerald-900/20">立即质押</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
