<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAiS - AI算力生态</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .token-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 50%; background: rgba(255,255,255,0.05); padding: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const GITHUB_USER = "shenganwang";
        const GITHUB_REPO = "HTB-logos";
        const getRawUrl = (filename) => `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${filename}`;
        
        const LOGOS = {
            USDT: "https://img.alicdn.com/imgextra/i2/O1CN01Z7Q5QO1M5V5V5V5V5_!!6000000001234-2-tps-200-200.png",
            HTB: getRawUrl("20260714165703_49_6.png"),
            YAiS: getRawUrl("20260714165704_50_6.png"),
            QLB: getRawUrl("20260714165706_51_6.png")
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [assets, setAssets] = useState({ usdt: 1000, htb: 500, yais: 120.5, qlb: 5000 });

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-900">
                    <main className="flex-1 p-4 overflow-y-auto">
                        {activeTab === 'home' && (
                            <div className="space-y-4">
                                <h1 className="text-2xl font-bold text-emerald-400">YAiS Eco</h1>
                                <div className="glass-card p-4 rounded-xl">
                                    <p className="text-slate-400 text-sm">总资产</p>
                                    <h2 className="text-3xl font-bold text-white">${(assets.usdt + assets.htb).toFixed(2)}</h2>
                                    <div className="grid grid-cols-3 gap-2 mt-4">
                                        {['HTB', 'YAiS', 'QLB'].map(token => (
                                            <div key={token} className="bg-slate-800 p-2 rounded text-center">
                                                <img src={LOGOS[token]} className="token-logo mx-auto" />
                                                <p className="text-xs text-white mt-1">{token}</p>
                                                <p className="text-xs text-emerald-400">{assets[token.toLowerCase()]}</p>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {activeTab === 'exchange' && <div className="text-white text-center pt-10">兑换功能开发中...</div>}
                    </main>
                    <nav className="fixed bottom-0 w-full max-w-md bg-slate-900 border-t border-slate-800 flex justify-around py-3">
                        <button onClick={() => setActiveTab('home')} className={`text-xs ${activeTab==='home'?'text-emerald-400':'text-slate-500'}`}>首页</button>
                        <button onClick={() => setActiveTab('exchange')} className={`text-xs ${activeTab==='exchange'?'text-emerald-400':'text-slate-500'}`}>兑换</button>
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
