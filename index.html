<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAiS 生态 - 恒通</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #0f172a; color: #e2e8f0; padding-bottom: 90px; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { color: #3b82f6; }
        .tab-inactive { color: #64748b; }
        
        /* 底部导航栏样式优化 */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
        .nav-item { text-align: center; color: #64748b; font-size: 12px; transition: all 0.2s; cursor: pointer; }
        .nav-item.active { color: #3b82f6; transform: translateY(-2px); }
        .nav-icon { font-size: 22px; display: block; margin-bottom: 4px; }

        /* 隐藏滚动条但保留滚动功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="antialiased selection:bg-blue-500 selection:text-white">

    <!-- 顶部 Header -->
    <header class="p-6 flex justify-between items-center sticky top-0 z-40 bg-[#0f172a]/90 backdrop-blur-md">
        <div>
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">YAiS 生态</h1>
            <p class="text-xs text-slate-400 mt-1">恒通算力 · 价值闭环</p>
        </div>
        <!-- 右上角 Logo (SVG绘制) -->
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-yellow-300 to-yellow-600 flex items-center justify-center shadow-lg shadow-yellow-500/20 border-2 border-yellow-200">
            <span class="font-serif font-bold text-slate-900 text-xl italic">HT</span>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main id="content-area" class="px-4 space-y-6 min-h-screen">
        
        <!-- 1. 首页内容 (默认显示) -->
        <div id="page-home" class="page-section">
            <!-- 资产卡片 -->
            <div class="glass-card p-6 mt-2 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                <p class="text-sm text-slate-400 mb-1">总资产估值 (USDT)</p>
                <h2 class="text-4xl font-bold text-white tracking-tight">$0.00</h2>
                
                <div class="grid grid-cols-3 gap-3 mt-6">
                    <div class="bg-slate-800/50 p-3 rounded-xl text-center border border-slate-700">
                        <div class="text-xs text-slate-400 mb-1">HTB</div>
                        <div class="font-bold text-yellow-500">0</div>
                    </div>
                    <div class="bg-slate-800/50 p-3 rounded-xl text-center border border-slate-700">
                        <div class="text-xs text-slate-400 mb-1">YAiS</div>
                        <div class="font-bold text-blue-400">0</div>
                    </div>
                    <div class="bg-slate-800/50 p-3 rounded-xl text-center border border-slate-700">
                        <div class="text-xs text-slate-400 mb-1">QLB</div>
                        <div class="font-bold text-orange-400">0</div>
                    </div>
                </div>
            </div>

            <!-- 节点引擎 -->
            <div class="glass-card p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-lg flex items-center"><span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>节点加速引擎</h3>
                    <span class="text-xs bg-blue-600 px-2 py-1 rounded text-white">运行中</span>
                </div>
                <div class="space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">当前持有节点</span>
                        <span class="font-bold">0 个</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">今日预估释放</span>
                        <span class="font-bold text-blue-400">+0 YAiS</span>
                    </div>
                    <div class="w-full bg-slate-700 h-2 rounded-full mt-2 overflow-hidden">
                        <div class="bg-gradient-to-r from-blue-500 to-purple-500 h-full w-[0%]"></div>
                    </div>
                    <div class="text-right text-xs text-slate-500">倍率: 1.0x (未激活)</div>
                </div>
            </div>

            <!-- 快速闪兑 -->
            <div class="glass-card p-5">
                <h3 class="font-bold text-lg mb-4">快速闪兑 / 兑换</h3>
                <div class="flex gap-3">
                    <button class="flex-1 bg-gradient-to-r from-blue-600 to-blue-500 py-3 rounded-xl font-bold text-sm shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">
                        HTB 兑换
                    </button>
                    <button class="flex-1 bg-slate-700 py-3 rounded-xl font-bold text-sm active:scale-95 transition-transform">
                        质押挖矿
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. 节点内容 (隐藏) -->
        <div id="page-node" class="page-section hidden">
            <div class="glass-card p-6 mt-2 text-center">
                <i class="fa-solid fa-server text-4xl text-blue-500 mb-4"></i>
                <h2 class="text-xl font-bold">节点中心</h2>
                <p class="text-slate-400 text-sm mt-2">购买算力节点，获取每日 YAiS 释放。</p>
                <button class="mt-6 w-full bg-blue-600 py-3 rounded-xl font-bold">查看节点列表</button>
            </div>
        </div>

        <!-- 3. AI 应用内容 (隐藏) -->
        <div id="page-ai" class="page-section hidden">
            <div class="mt-2 mb-4">
                <h2 class="text-2xl font-bold text-white">AI 应用广场</h2>
                <p class="text-slate-400 text-sm">使用 YAiS 代币支付，调用顶级 AI 模型。</p>
            </div>

            <!-- AI 功能列表 -->
            <div class="space-y-4">
                <!-- 卡片 1：AI 绘画 -->
                <!-- 已替换为您提供的真实网址 -->
                <a href="https://ysai.lzxjsm.cn/h5/5.html#/pages/index/index" target="_blank" class="block glass-card p-4 flex items-center gap-4 active:scale-[0.98] transition-transform">
                    <div class="w-12 h-12 rounded-lg bg-purple-500/20 flex items-center justify-center text-purple-400 text-xl">
                        <i class="fa-solid fa-palette"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">AI 智能绘画</h3>
                        <p class="text-xs text-slate-400">输入文字生成高清艺术画作</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-600"></i>
                </a>

                <!-- 卡片 2：AI 文案 -->
                <a href="https://chat.openai.com" target="_blank" class="block glass-card p-4 flex items-center gap-4 active:scale-[0.98] transition-transform">
                    <div class="w-12 h-12 rounded-lg bg-green-500/20 flex items-center justify-center text-green-400 text-xl">
                        <i class="fa-solid fa-pen-nib"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">AI 文案助手</h3>
                        <p class="text-xs text-slate-400">自动撰写营销软文与脚本</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-600"></i>
                </a>

                 <!-- 卡片 3：数字人 -->
                 <a href="#" class="block glass-card p-4 flex items-center gap-4 active:scale-[0.98] transition-transform">
                    <div class="w-12 h-12 rounded-lg bg-pink-500/20 flex items-center justify-center text-pink-400 text-xl">
                        <i class="fa-solid fa-video"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">AI 数字人</h3>
                        <p class="text-xs text-slate-400">定制专属虚拟主播</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-600"></i>
                </a>
            </div>
        </div>

        <!-- 4. 我的内容 (隐藏) -->
        <div id="page-profile" class="page-section hidden">
             <div class="glass-card p-6 mt-2 text-center">
                <div class="w-20 h-20 bg-slate-700 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl">👤</div>
                <h2 class="text-xl font-bold">未登录</h2>
                <p class="text-slate-400 text-sm mt-2">连接钱包以管理您的资产</p>
                <button class="mt-6 w-full border border-blue-500 text-blue-400 py-3 rounded-xl font-bold">连接钱包</button>
            </div>
        </div>

    </main>

    <!-- 底部导航栏 -->
    <nav class="bottom-nav flex justify-around items-center h-[70px]">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <i class="fa-solid fa-house nav-icon"></i>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="switchTab('node', this)">
            <i class="fa-solid fa-bolt nav-icon"></i>
            <span>节点</span>
        </div>
        <div class="nav-item" onclick="switchTab('ai', this)">
            <i class="fa-solid fa-robot nav-icon"></i>
            <span>AI应用</span>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <i class="fa-solid fa-user nav-icon"></i>
            <span>我的</span>
        </div>
    </nav>

    <script>
        // 切换标签页逻辑
        function switchTab(tabName, element) {
            // 1. 处理底部按钮样式
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                item.classList.add('tab-inactive');
            });
            element.classList.add('active');
            element.classList.remove('tab-inactive');

            // 2. 处理页面内容显示
            document.querySelectorAll('.page-section').forEach(page => {
                page.classList.add('hidden');
            });
            
            // 显示对应的页面 ID
            const targetPage = document.getElementById('page-' + tabName);
            if(targetPage) {
                targetPage.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
