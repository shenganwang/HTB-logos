<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAiS 生态 - 恒通</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #0f172a; /* 深蓝背景 */
            color: #e2e8f0;
            padding-bottom: 90px; /* 关键修改：增加底部留白，防止菜单被遮挡 */
            margin: 0;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        /* 底部导航栏样式优化 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 25px 0; /* 适配 iPhone 底部横条 */
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            color: #64748b;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-item.active {
            color: #8b5cf6; /* 激活时的紫色 */
        }
        .nav-icon {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }
        /* 页面切换动画 */
        .page-section {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }
        .page-section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- 顶部 Header -->
    <div class="flex justify-between items-center p-6">
        <div>
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-blue-500">YAiS 生态</h1>
            <p class="text-xs text-gray-400 mt-1">恒通算力 · 价值闭环</p>
        </div>
        <!-- 右上角 Logo (使用 SVG 绘制，保证不挂图) -->
        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-yellow-600 to-yellow-300 flex items-center justify-center shadow-lg border-2 border-yellow-500/30">
            <span class="text-black font-bold text-xl italic font-serif">HT</span>
        </div>
    </div>

    <!-- ================= 首页内容 ================= -->
    <div id="page-home" class="page-section active px-4">
        <!-- 资产卡片 -->
        <div class="glass-card">
            <div class="text-sm text-gray-400 mb-2">总资产估值 (USDT)</div>
            <div class="text-4xl font-bold text-white mb-6">$0.00</div>
            <div class="grid grid-cols-3 gap-3 text-center">
                <div class="bg-slate-800/50 rounded-lg p-2 border border-slate-700">
                    <div class="text-xs text-gray-400">HTB</div>
                    <div class="text-yellow-500 font-bold">0</div>
                </div>
                <div class="bg-slate-800/50 rounded-lg p-2 border border-slate-700">
                    <div class="text-xs text-gray-400">YAiS</div>
                    <div class="text-blue-400 font-bold">0</div>
                </div>
                <div class="bg-slate-800/50 rounded-lg p-2 border border-slate-700">
                    <div class="text-xs text-gray-400">QLB</div>
                    <div class="text-orange-400 font-bold">0</div>
                </div>
            </div>
        </div>

        <!-- 节点加速引擎 -->
        <div class="glass-card">
            <div class="flex justify-between items-center mb-4">
                <div class="flex items-center">
                    <div class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></div>
                    <h3 class="font-bold text-lg">节点加速引擎</h3>
                </div>
                <span class="text-xs bg-purple-900 text-purple-200 px-2 py-1 rounded">运行中</span>
            </div>
            <div class="flex justify-between text-sm mb-2">
                <span class="text-gray-400">当前持有节点</span>
                <span class="font-bold">0 个</span>
            </div>
            <div class="flex justify-between text-sm mb-4">
                <span class="text-gray-400">今日预估释放</span>
                <span class="font-bold text-blue-400">+0 YAiS</span>
            </div>
            <div class="w-full bg-gray-700 rounded-full h-2 mb-2">
                <div class="bg-gradient-to-r from-blue-500 to-purple-600 h-2 rounded-full" style="width: 0%"></div>
            </div>
            <div class="text-right text-xs text-gray-500">倍率: 1.0x (未激活)</div>
        </div>

        <!-- 快速闪充 -->
        <div class="mt-6">
            <h3 class="text-xl font-bold mb-4 px-2">快速闪充 / 兑换</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col items-center justify-center h-24 active:bg-slate-700 transition">
                    <i class="fas fa-bolt text-yellow-400 text-2xl mb-2"></i>
                    <span class="text-sm">HTB 闪充</span>
                </div>
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col items-center justify-center h-24 active:bg-slate-700 transition">
                    <i class="fas fa-exchange-alt text-blue-400 text-2xl mb-2"></i>
                    <span class="text-sm">币币兑换</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= 节点页面 (占位) ================= -->
    <div id="page-node" class="page-section px-4 pt-6 text-center">
        <i class="fas fa-server text-6xl text-gray-600 mb-4"></i>
        <h2 class="text-xl font-bold">节点中心</h2>
        <p class="text-gray-400 mt-2">这里展示节点购买和算力详情。</p>
    </div>

    <!-- ================= AI应用页面 (占位) ================= -->
    <div id="page-ai" class="page-section px-4 pt-6 text-center">
        <i class="fas fa-robot text-6xl text-gray-600 mb-4"></i>
        <h2 class="text-xl font-bold">AI 应用广场</h2>
        <p class="text-gray-400 mt-2">这里展示 YAiS 生态下的各种 AI 工具。</p>
    </div>

    <!-- ================= 我的页面 (占位) ================= -->
    <div id="page-user" class="page-section px-4 pt-6 text-center">
        <i class="fas fa-user-circle text-6xl text-gray-600 mb-4"></i>
        <h2 class="text-xl font-bold">个人中心</h2>
        <p class="text-gray-400 mt-2">账户设置、安全中心、邀请好友。</p>
    </div>

    <!-- 底部导航栏 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchPage('home', this)">
            <i class="fas fa-home nav-icon"></i>
            <span>首页</span>
        </div>
        <div class="nav-item" onclick="switchPage('node', this)">
            <i class="fas fa-bolt nav-icon"></i>
            <span>节点</span>
        </div>
        <div class="nav-item" onclick="switchPage('ai', this)">
            <i class="fas fa-robot nav-icon"></i>
            <span>AI应用</span>
        </div>
        <div class="nav-item" onclick="switchPage('user', this)">
            <i class="fas fa-user nav-icon"></i>
            <span>我的</span>
        </div>
    </div>

    <script>
        // 页面切换逻辑
        function switchPage(pageId, element) {
            // 1. 隐藏所有页面
            const pages = document.querySelectorAll('.page-section');
            pages.forEach(page => page.classList.remove('active'));

            // 2. 显示目标页面
            const targetPage = document.getElementById('page-' + pageId);
            if(targetPage) {
                targetPage.classList.add('active');
            }

            // 3. 更新底部按钮状态
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
