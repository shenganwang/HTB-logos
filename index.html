<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAiS 生态 - 调试版</title>
    <!-- 引入 Ethers.js (使用兼容性好一点的版本) -->
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js" type="application/javascript"></script>
    
    <style>
        /* 强制重置，防止样式错乱 */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #0d1117; color: white; font-family: sans-serif; padding-bottom: 80px; }
        
        /* 顶部调试面板样式 - 绝对定位，不干扰下方原有布局 */
        #debug-panel {
            background: rgba(30, 30, 30, 0.95);
            border-bottom: 2px solid #f0b90b;
            padding: 20px;
            text-align: center;
            position: relative;
            z-index: 9999; /* 保证在最上层 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .status-text { font-size: 14px; color: #aaa; margin-bottom: 10px; }
        .balance-text { font-size: 18px; color: #fff; font-weight: bold; margin: 5px 0; }
        
        /* 大按钮样式 */
        .action-btn {
            background-color: #f0b90b;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-top: 10px;
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* 简单的日志显示区 */
        #log-area {
            font-size: 12px;
            color: #00ff00;
            text-align: left;
            margin-top: 10px;
            background: black;
            padding: 5px;
            height: 60px;
            overflow-y: auto;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <!-- 这是一个独立的调试面板，放在最上面 -->
    <div id="debug-panel">
        <h2 style="margin:0 0 10px 0;">🛠️ 资产连接器</h2>
        <div class="status-text" id="wallet-status">等待连接...</div>
        
        <!-- 显示余额的地方 -->
        <div id="balances" style="display:none;">
            <div class="balance-text">HTB: <span id="bal-htb">Loading...</span></div>
            <div class="balance-text">YAiS: <span id="bal-yais">Loading...</span></div>
            <div class="balance-text">QLB: <span id="bal-qlb">Loading...</span></div>
        </div>

        <button class="action-btn" onclick="connectWallet()">👉 点击连接钱包</button>
        
        <!-- 日志窗口，方便看报错 -->
        <div id="log-area">系统就绪...</div>
    </div>

    <!-- 下面保留你原本的网页内容不动 -->
    <div style="padding: 20px; text-align: center; opacity: 0.5;">
        <p>（原网页内容在下方，如果底部菜单回来了，说明修复成功）</p>
    </div>

    <script>
        // 配置区域
        const CONFIG = {
            htb: "0xbb6f0D3C7676007c3e7445a421116f2627b54444",
            yais: "0x3f435310b025424193ba5f59964219fc67964444",
            qlb: "0xea491e0077236b8b22d03cbd4372f28207b54444"
        };

        // 简易日志函数
        function log(msg) {
            const el = document.getElementById('log-area');
            el.innerHTML += "<br>> " + msg;
            el.scrollTop = el.scrollHeight;
            console.log(msg);
        }

        async function connectWallet() {
            log("开始尝试连接...");
            
            // 1. 检查环境
            if (typeof window.ethereum === 'undefined') {
                // 针对 TP 钱包的特殊检测
                if (window.tokenpocket && window.tokenpocket.ethereum) {
                    window.ethereum = window.tokenpocket.ethereum;
                    log("检测到 TP 钱包环境");
                } else {
                    alert("未检测到钱包！请在 TP 钱包或 MetaMask 的 DApp 浏览器中打开此页面。");
                    log("错误：未找到钱包");
                    return;
                }
            }

            try {
                // 2. 请求连接
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                const address = await signer.getAddress();
                
                // 3. 连接成功 UI 更新
                document.getElementById('wallet-status').innerText = "已连接: " + address.substring(0,6) + "..." + address.substring(38);
                document.getElementById('wallet-status').style.color = "#00ff00";
                document.getElementById('balances').style.display = "block";
                log("连接成功: " + address);

                // 4. 查询余额 (简化版，只查 HTB 做演示，防止代码太长出错)
                checkBalance(provider, address, CONFIG.htb, 'bal-htb', 18);
                checkBalance(provider, address, CONFIG.yais, 'bal-yais', 18);
                checkBalance(provider, address, CONFIG.qlb, 'bal-qlb', 18);

            } catch (error) {
                log("连接失败: " + error.message);
                console.error(error);
            }
        }

        async function checkBalance(provider, address, contractAddress, elementId, decimals) {
            try {
                // 标准的 ERC20 余额查询接口
                const abi = ["function balanceOf(address owner) view returns (uint256)"];
                const contract = new ethers.Contract(contractAddress, abi, provider);
                const balance = await contract.balanceOf(address);
                const formatted = ethers.utils.formatUnits(balance, decimals);
                document.getElementById(elementId).innerText = parseFloat(formatted).toFixed(2);
                log(elementId + " 查询成功");
            } catch (e) {
                document.getElementById(elementId).innerText = "查询失败";
                log(elementId + " 错误");
            }
        }
    </script>
</body>
</html>
<!-- === 开始粘贴：TP钱包连接修复补丁 === -->
<script type="text/javascript">
    // 等待页面完全加载后再运行，防止卡死
    window.addEventListener('load', function() {
        console.log("修复脚本已启动...");

        // 1. 尝试寻找你的连接按钮
        // 注意：如果你的按钮ID不是 'connectBtn'，请根据实际情况修改，或者脚本会尝试模糊匹配
        var btn = document.getElementById('connectBtn') || 
                  document.querySelector('button'); // 临时方案：如果找不到特定ID，先找第一个按钮测试

        // 2. 定义连接逻辑
        async function connectWallet() {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    alert("正在唤起钱包...");
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const account = accounts[0];
                    alert("连接成功！地址: " + account);
                    // 这里可以添加后续逻辑，比如跳转页面
                } catch (error) {
                    console.error(error);
                    alert("连接失败或取消");
                }
            } else {
                alert("未检测到钱包环境，请在TP钱包App内打开");
            }
        }

        // 3. 绑定点击事件
        if (btn) {
            btn.onclick = connectWallet;
            console.log("按钮修复成功");
        } else {
            console.warn("未找到按钮，请检查HTML中的ID");
        }
    });
</script>
<!-- === 结束粘贴 === -->
<!-- === YAiS 生态资产查询模块 (独立悬浮版) === -->
<div id="yais-wallet-widget" style="position: fixed; bottom: 20px; right: 20px; z-index: 99999; font-family: sans-serif;">
    <!-- 悬浮按钮 -->
    <button id="yais-connect-btn" onclick="toggleYAiSWallet()" style="background: #f0b90b; color: #000; border: none; padding: 12px 20px; border-radius: 30px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; gap: 8px;">
        <span>🦊</span> <span id="yais-btn-text">连接钱包</span>
    </button>

    <!-- 资产详情面板 (默认隐藏) -->
    <div id="yais-asset-panel" style="display: none; position: absolute; bottom: 60px; right: 0; width: 280px; background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(10px); border: 1px solid #333; border-radius: 12px; padding: 15px; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="font-size: 12px; color: #aaa; margin-bottom: 10px; text-align: right;" id="yais-address-display">未连接</div>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
            <span>HTB (稳定币)</span>
            <span id="yais-bal-htb" style="color: #f0b90b; font-weight: bold;">Loading...</span>
        </div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px;">
            <span>YAiS (释放币)</span>
            <span id="yais-bal-yais" style="color: #a371f7; font-weight: bold;">Loading...</span>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <span>QLB (算力币)</span>
            <span id="yais-bal-qlb" style="color: #58a6ff; font-weight: bold;">Loading...</span>
        </div>
    </div>
</div>

<script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
<script>
    // 配置中心
    const YAiS_CONFIG = {
        htb: "0xbb6fec528ffd252f6f22d6d05608599645144444",
        yais: "0x3f431ffcda5ce875a45d462272a07ab1886d4444",
        qlb: "0xea491e0077236b8b22d03cbd4372f28207b54444" // 已修正为正确地址
    };

    let yaisProvider, yaisSigner, yaisUserAddress;

    async function toggleYAiSWallet() {
        const btnText = document.getElementById('yais-btn-text');
        const panel = document.getElementById('yais-asset-panel');
        
        // 如果已经连接，则切换面板显示/隐藏
        if (yaisUserAddress) {
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            return;
        }

        // 开始连接逻辑
        btnText.innerText = "连接中...";
        if (typeof window.ethereum !== 'undefined') {
            try {
                yaisProvider = new ethers.providers.Web3Provider(window.ethereum);
                await yaisProvider.send("eth_requestAccounts", []);
                yaisSigner = yaisProvider.getSigner();
                yaisUserAddress = await yaisSigner.getAddress();
                
                // 更新 UI
                btnText.innerText = "查看资产";
                document.getElementById('yais-address-display').innerText = yaisUserAddress.substring(0,6) + "..." + yaisUserAddress.substring(38);
                panel.style.display = 'block';
                
                // 查询余额
                fetchYAiSBalances();
            } catch (error) {
                console.error(error);
                btnText.innerText = "连接失败";
                alert("连接被取消或出错");
            }
        } else {
            alert("请在 TokenPocket 或 MetaMask 中打开此页面");
            btnText.innerText = "无钱包环境";
        }
    }

    async function fetchYAiSBalances() {
        if (!yaisUserAddress) return;
        const abi = ["function balanceOf(address owner) view returns (uint256)", "function decimals() view returns (uint8)"];
        
        // 查询 HTB
        const cHTB = new ethers.Contract(YAiS_CONFIG.htb, abi, yaisProvider);
        const bHTB = await cHTB.balanceOf(yaisUserAddress);
        const dHTB = await cHTB.decimals();
        document.getElementById('yais-bal-htb').innerText = parseFloat(ethers.utils.formatUnits(bHTB, dHTB)).toFixed(2);

        // 查询 YAiS
        const cYAiS = new ethers.Contract(YAiS_CONFIG.yais, abi, yaisProvider);
        const bYAiS = await cYAiS.balanceOf(yaisUserAddress);
        const dYAiS = await cYAiS.decimals();
        document.getElementById('yais-bal-yais').innerText = parseFloat(ethers.utils.formatUnits(bYAiS, dYAiS)).toFixed(2);

        // 查询 QLB
        const cQLB = new ethers.Contract(YAiS_CONFIG.qlb, abi, yaisProvider);
        const bQLB = await cQLB.balanceOf(yaisUserAddress);
        const dQLB = await cQLB.decimals();
        document.getElementById('yais-bal-qlb').innerText = parseFloat(ethers.utils.formatUnits(bQLB, dQLB)).toFixed(2);
    }
</script>
<!-- === 结束 === -->
