<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YAiS - AI算力生态</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .gradient-text { background: linear-gradient(to right, #60a5fa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-item.active { color: #34d399; }
        .token-logo { width: 48px; height: 48px; object-fit: contain; border-radius: 50%; background: rgba(255,255,255,0.05); padding: 4px; margin-bottom: 8px; transition: transform 0.2s; }
        .token-logo:hover { transform: scale(1.1); }
        .glow-effect { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 10px rgba(52, 211, 153, 0.2); } 50% { box-shadow: 0 0 20px rgba(52, 211, 153, 0.5); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // 【核心配置区】已根据你的要求自动配置
        // ==========================================
        const GITHUB_USER = "shenganwang";
        const GITHUB_REPO = "HTB-logos";
        const BRANCH = "main"; 

        const getRawUrl = (filename) => {
            return `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/${BRANCH}/${filename}`;
        };

        const LOGOS = {
            USDT: "https://img.alicdn.com/imgextra/i2/O1CN01Z7Q5QO1M5V5V5V5V5_!!6000000001234-2-tps-200-200.png",
            HTB: getRawUrl("20260714165703_49_6.png"),
            YAiS: getRawUrl("20260714165704_50_6.png"),
            QLB: getRawUrl("20260714165706_51_6.png")
        };

        const Icon = ({ name, size = 24, color = "currentColor" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} width={size} height={size} stroke={color}></i>;
        };

        function App() {
            const [activeTab, setActiveTab] = useState('home');
            const [assets, setAssets] = useState({ usdt: 1000.00, htb: 500.00, yais: 120.50, qlb: 5000.00, nodes: 1500 });

            const getMultiplier = (count) => {
                if (count >= 3000) return 3.0;
                if (count >= 1000) return 2.0;
                if (count >= 100) return 1.6;
                return 1.0;
            };
            const multiplier = getMultiplier(assets.nodes);
            const dailyRelease = (assets.nodes * 0.005 * multiplier).toFixed(2);

            return (
                <div className="flex flex-col h-screen max-w-md mx-auto bg-slate-900 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-blue-900/20 to-transparent pointer-events-none"></div>

                    <main className="flex-1 overflow-y-auto pb-20 p-4 scrollbar-hide">
                        {activeTab === 'home' && <Home assets={assets} multiplier={multiplier} dailyRelease={dailyRelease} />}
                        {activeTab === 'exchange' && <Exchange assets={assets} setAssets={setAssets} />}
                        {activeTab === 'nodes' && <Nodes assets={assets} />}
                        {activeTab === 'ai' && <AIApp assets={assets} />}
                    </main>

                    <nav className="fixed bottom-0 w-full max-w-md bg-slate-900/90 backdrop-blur-md border-t border-slate-800 flex justify-around items-center py-3 z-50">
                        <NavBtn icon="home" label="首页" active={activeTab === 'home'} onClick={() => setActiveTab('home')} />
                        <NavBtn icon="refresh-cw" label="兑换" active={activeTab === 'exchange'} onClick={() => setActiveTab('exchange')} />
                        <NavBtn icon="server" label="节点" active={activeTab === 'nodes'} onClick={() => setActiveTab('nodes')} />
                        <NavBtn icon="cpu" label="AI应用" active={activeTab === 'ai'} onClick={() => setActiveTab('ai')} />
                    </nav>
                </div>
            );
        }

        function NavBtn({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`flex flex-col items-center space-y-1 ${active ? 'text-emerald-400' : 'text-slate-500'}`}>
                    <Icon name={icon} size={20} color={active ? '#34d399' : '#64748b'} />
                    <span className="text-xs">{label}</span>
                </button>
            );
        }

        function Home({ assets, multiplier, dailyRelease }) {
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center mb-4">
                        <div>
                            <h1 className="text-2xl font-bold gradient-text">YAiS Eco</h1>
                            <p className="text-xs text-slate-400">AI算力驱动的未来经济</p>
                        </div>
                        <div className="bg-slate-800 px-3 py-1 rounded-full text-xs text-emerald-400 border border-emerald-900">
                            Lv.{assets.nodes >= 3000 ? 'Max' : assets.nodes >= 1000 ? 'Pro' : 'Basic'}
                        </div>
                    </div>

                    <div className="glass-card rounded-2xl p-6 glow-effect">
                        <p className="text-slate-400 text-sm mb-1">预估总资产 (USDT)</p>
                        <h2 className="text-3xl font-bold text-white mb-4">
                            ${(assets.usdt + assets.htb + (assets.yais * 0.1)).toLocaleString(undefined, {minimumFractionDigits: 2})}
                        </h2>
                        
                        <div className="grid grid-cols-3 gap-2 mt-4">
                            <AssetItem label="HTB" value={assets.htb} logo={LOGOS.HTB} color="text-blue-400" />
                            <AssetItem label="YAiS" value={assets.yais} logo={LOGOS.YAiS} color="text-amber-400" />
                            <AssetItem label="QLB" value={assets.qlb} logo={LOGOS.QLB} color="text-emerald-400" />
                        </div>
                    </div>

                    <div className="glass-card rounded-xl p-4 border-l-4 border-amber-500">
                        <div className="flex justify-between items-center">
                            <div>
                                <p className="text-slate-400 text-xs">当前节点数</p>
                                <p className="text-xl font-bold text-white">{assets.nodes} Nodes</p>
                            </div>
                            <div className="text-right">
                                <p className="text-slate-400 text-xs">释放倍率</p>
                                <p className="text-xl font-bold text-amber-400">{multiplier}x</p>
                            </div>
                        </div>
                        <div className="mt-3 pt-3 border-t border-slate-700 flex justify-between items-center">
                            <span className="text-xs text-slate-400">今日预计释放</span>
                            <span className="text-sm font-bold text-amber-400">+{dailyRelease} YAiS</span>
                        </div>
                    </div>
                </div>
            );
        }

        function AssetItem({ label, value, logo, color }) {
            return (
                <div className="bg-slate-800/50 p-2 rounded-lg text-center flex flex-col items-center">
                    <img src={logo} alt={label} className="token-logo" onError={(e) => e.target.style.display='none'} />
                    <p className={`text-xs ${color} font-bold`}>{label}</p>
                    <p className="text-sm font-mono text-white truncate">{Number(value).toLocaleString()}</p>
                </div>
            );
        }

        function Exchange({ assets, setAssets }) {
            const [mode, setMode] = useState('UtoH');
            const [amount, setAmount] = useState('');

            const handleSwap = () => {
                if (!amount || parseFloat(amount) <= 0) return alert("请输入有效数量");
                const val = parseFloat(amount);
                
                if (mode === 'UtoH') {
                    if (val > assets.usdt) return alert("USDT 余额不足");
                    setAssets(prev => ({...prev, usdt: prev.usdt - val, htb: prev.htb + val}));
                } else if (mode === 'HtoU') {
                    if (val > assets.htb) return alert("HTB 余额不足");
                    setAssets(prev => ({...prev, htb: prev.htb - val, usdt: prev.usdt + val}));
                } else if (mode === 'YtoH') {
                    if (val > assets.yais) return alert("YAiS 余额不足");
                    setAssets(prev => ({...prev, yais: prev.yais - val, htb: prev.htb + (val * 0.1)}));
                } else if (mode === 'YtoQ') {
                    if (val > assets.yais) return alert("YAiS 余额不足");
                    setAssets(prev => ({...prev, yais: prev.yais - val, qlb: prev.qlb + (val * 10)}));
                }
                setAmount('');
                alert("兑换成功！");
            };

            const getRateText = () => {
                if (mode === 'UtoH' || mode === 'HtoU') return "1 : 1";
                if (mode === 'YtoH') return "1 YAiS = 0.1 HTB";
                if (mode === 'YtoQ') return "1 YAiS = 10 QLB";
            };

            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-bold text-white mb-6">资产兑换中心</h2>
                    <div className="grid grid-cols-2 gap-2 mb-6">
                        <button onClick={() => setMode('UtoH')} className={`p-3 rounded-lg text-sm font-bold ${mode === 'UtoH' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400'}`}>USDT → HTB</button>
                        <button onClick={() => setMode('HtoU')} className={`p-3 rounded-lg text-sm font-bold ${mode === 'HtoU' ? 'bg-blue-600 text-white' : 'bg-slate-800 text-slate-400'}`}>HTB → USDT</button>
                        <button onClick={() => setMode('YtoH')} className={`p-3 rounded-lg text-sm font-bold ${mode === 'YtoH' ? 'bg-amber-600 text-white' : 'bg-slate-800 text-slate-400'}`}>YAiS → HTB</button>
                        <button onClick={() => setMode('YtoQ')} className={`p-3 rounded-lg text-sm font-bold ${mode === 'YtoQ' ? 'bg-emerald-600 text-white' : 'bg-slate-800 text-slate-400'}`}>YAiS → QLB</button>
                    </div>

                    <div className="glass-card p-6 rounded-2xl relative">
                        <div className="absolute top-0 right-0 bg-slate-700 text-xs px-2 py-1 rounded-bl-lg text-slate-300">汇率: {getRateText()}</div>
                        <div className="mb-6">
                            <label className="text-xs text-slate-400 block mb-2">支付数量</label>
                            <div className="flex items-center bg-slate-900 rounded-lg p-3 border border-slate-700">
                                <input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} className="bg-transparent text-white text-xl w-full outline-none" placeholder="0.00" />
                                <span className="text-slate-400 font-bold ml-2">{mode.includes('U') ? 'USDT' : mode.includes('H') && mode !== 'YtoH' ? 'HTB' : 'YAiS'}</span>
                            </div>
                        </div>
                        <div className="flex justify-center mb-6"><Icon name="arrow-down" size={24} className="text-slate-500" /></div>
                        <div>
                            <label className="text-xs text-slate-400 block mb-2">获得数量 (预估)</label>
                            <div className="flex items-center bg-slate-800/50 rounded-lg p-3 border border-slate-700/50">
                                <span className="text-xl text-white font-mono">{amount ? (mode === 'YtoQ' ? amount * 10 : mode === 'YtoH' ? amount * 0.1 : amount) : '0.00'}</span>
                                <span className="text-slate-400 font-bold ml-2">{mode === 'UtoH' || mode === 'HtoU' || mode === 'YtoH' ? 'HTB' : 'QLB'}</span>
                            </div>
                        </div>
                        <button onClick={handleSwap} className="w-full mt-8 bg-gradient-to-r from-blue-600 to-emerald-600 py-3 rounded-xl font-bold text-white shadow-lg active:scale-95 transition-transform">确认兑换</button>
                    </div>
                </div>
            );
        }

        function Nodes({ assets }) {
            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-bold text-white">节点权益中心</h2>
                    <div className="glass-card p-4 rounded-xl bg-gradient-to-br from-slate-800 to-slate-900">
                        <p className="text-slate-400 text-sm">当前持有节点</p>
                        <div className="flex items-end gap-2 mt-1">
                            <span className="text-3xl font-bold text-white">{assets.nodes}</span>
                            <span className="text-sm text-slate-500 mb-1">个</span>
                        </div>
                    </div>
                    <div className="glass-card p-4 rounded-xl border-l-4 border-amber-500">
                        <p className="font-bold text-white">当前倍率: {assets.nodes >= 1000 ? '2.0x' : '1.6x'}</p>
                        <p className="text-xs text-slate-400 mt-1">每日单节点释放: 0.005 * 倍率 YAiS</p>
                    </div>
                </div>
            );
        }

        function AIApp({ assets }) {
            return (
                <div className="space-y-6">
                    <h2 className="text-xl font-bold text-white">AI 算力应用</h2>
                    <div className="glass-card p-6 rounded-2xl text-center border border-emerald-900/50">
                        <div className="w-16 h-16 bg-emerald-900/30 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-400">
                            <Icon name="cpu" size={32} />
                        </div>
                        <h3 className="text-lg font-bold text-white">QLB 算力质押</h3>
                        <p className="text-sm text-slate-400 mt-2 mb-4">锁定 QLB 获取平台分红</p>
                        <div className="bg-slate-900 p-3 rounded-lg mb-4">
                            <span className="text-slate-400 text-xs">可用 QLB</span>
                            <div className="text-xl font-mono text-emerald-400">{assets.qlb.toLocaleString()}</div>
                        </div>
                        <button className="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-2 rounded-lg font-bold transition">立即质押</button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
