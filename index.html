<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>YAiS 生态资产看板</title>
    <!-- 引入 Ethers.js 库，用于连接 BNB 链 -->
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js" type="application/javascript"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center; }
        .card { background: white; border-radius: 10px; padding: 20px; margin: 10px auto; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { background-color: #f0b90b; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px;}
        .btn:hover { background-color: #d1a006; }
        .balance { font-size: 24px; font-weight: bold; color: #333; margin: 10px 0; }
        .label { color: #666; font-size: 14px; }
        #walletAddress { word-break: break-all; color: #007bff; font-size: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>💎 YAiS 生态资产看板</h2>
    
    <!-- 钱包连接状态 -->
    <div id="status">请先连接钱包</div>
    <button class="btn" onclick="connectWallet()">🦊 连接 MetaMask (BNB主网)</button>

    <!-- 资产展示区 -->
    <div id="assets" style="display:none;">
        <div class="card">
            <div class="label">恒通稳定币 (HTB)</div>
            <div class="balance" id="htbBalance">0.00</div>
        </div>
        <div class="card">
            <div class="label">生态释放币 (YAiS)</div>
            <div class="balance" id="yaisBalance">0.00</div>
        </div>
        <div class="card">
            <div class="label">算力积分 (QLB)</div>
            <div class="balance" id="qlbBalance">0.00</div>
        </div>
    </div>

<script>
    // ==========================================
    // 【配置中心】：以后换地址、换链只改这里！
    // ==========================================
    const CONFIG = {
        chainId: 56, // BNB 主网 ID
        tokens: {
            HTB: {
                name: "恒通稳定币",
                address: "0xbb6fec528ffd252f6f22d6d05608599645144444", 
                decimals: 18 // 如果精度不同请修改此处
            },
            YAiS: {
                name: "生态释放币",
                address: "0x3f431ffcda5ce875a45d462272a07ab1886d4444",
                decimals: 18
            },
            QLB: {
                name: "算力积分",
                address: "0xea491e0077236b8b22d03cbd4372f28207b54444",
                decimals: 18
            }
        }
    };

    let provider, signer, userAddress;

    // 极简 ERC20 接口（用于读取余额）
    const ERC20_ABI = [
        "function balanceOf(address owner) view returns (uint256)",
        "function decimals() view returns (uint8)"
    ];

    async function connectWallet() {
        if (typeof window.ethereum === 'undefined') {
            alert("请先安装 MetaMask 钱包！");
            return;
        }

        try {
            provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            userAddress = await signer.getAddress();

            // 检查网络是否为 BNB 主网
            const network = await provider.getNetwork();
            if (network.chainId !== CONFIG.chainId) {
                alert(`当前网络错误！请切换到 BNB Smart Chain (ID: ${CONFIG.chainId})`);
                return;
            }

            document.getElementById('status').innerText = `已连接: ${userAddress.substring(0,6)}...${userAddress.substring(38)}`;
            document.getElementById('assets').style.display = 'block';
            
            // 自动刷新余额
            updateBalances();
        } catch (error) {
            console.error(error);
            alert("连接失败，请查看控制台报错");
        }
    }

    async function updateBalances() {
        if (!userAddress) return;

        // 循环读取三个代币的余额
        for (const key in CONFIG.tokens) {
            const token = CONFIG.tokens[key];
            const contract = new ethers.Contract(token.address, ERC20_ABI, signer);
            
            try {
                const rawBalance = await contract.balanceOf(userAddress);
                // 将原始数值转换为人类可读的小数
                const formattedBalance = ethers.utils.formatUnits(rawBalance, token.decimals);
                document.getElementById(`${key.toLowerCase()}Balance`).innerText = parseFloat(formattedBalance).toFixed(4);
            } catch (err) {
                console.error(`读取 ${token.name} 失败:`, err);
                document.getElementById(`${key.toLowerCase()}Balance`).innerText = "读取失败";
            }
        }
    }
</script>
</body>
</html>
